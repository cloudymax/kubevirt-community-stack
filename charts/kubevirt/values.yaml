# Default values for kubevirt.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
# -- number of replicas
replicaCount: 1

image:
  # --  container repository
  repository: quay.io/kubevirt/virt-operator
  # -- image pull policy
  pullPolicy: IfNotPresent
  # -- image tag, use this to set the version of kubevirt
  tag: "v1.8.1"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- Specifies whether a service account should be created
  create: true
  # -- Annotations to add to the service account
  annotations: {}
  # -- The name of the service account to use. If not set and create is true, a name is generated using the fullname template
  name: "kubevirt-operator"

podAnnotations: {}

podSecurityContext: {}

securityContext:
  # -- sets the container to privileged
  privileged: true

resources: {}
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

nodeSelector: {}
# -- toleration for CriticalAddonsOnly
tolerations:
  - key: CriticalAddonsOnly
    operator: Exists

rateLimits:
  api:
    burst: 10
    qps: 5
  controller:
    burst: 30
    qps: 20
  handler:
    burst: 10
    qps: 5
  webhook:
    burst: 400
    qps: 200

migrations:
  # -- AllowAutoConverge allows the platform to compromise
  # performance/availability of VMIs to guarantee successful
  # VMI live migrations. Defaults to false
  allowAutoConverge: false
  # -- AllowPostCopy enables post-copy live migrations.
  # Such migrations allow even the busiest VMIs to successfully live-migrate.
  # However, events like a network failure can cause a VMI crash.
  # If set to true, migrations will still start in pre-copy, but switch
  # to post-copy when CompletionTimeoutPerGiB triggers.
  # Defaults to false
  allowPostCopy: false
  # --AllowWorkloadDisruption indicates that the migration shouldn't be
  # canceled after acceptableCompletionTime is exceeded. Instead, if
  # permitted, migration will be switched to post-copy or the VMI will be
  # paused to allow the migration to complete
  allowWorkloadDisruption: false
  # -- BandwidthPerMigration limits the amount of network bandwidth live
  # migrations are allowed to use. The value is in quantity per second.
  # Defaults to 0 (no limit)
  bandwidthPerMigration: 0

# -- by default forces replicas to different knodes
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: kubevirt.io
                operator: In
                values:
                  - virt-operator
          topologyKey: kubernetes.io/hostname
        weight: 1

priorityclass:
  # -- craete priorityclass by default
  create: true
  # -- default priorityclass value
  value: 1000000000

permittedHostDevices:
  pciHostDevices:
  - pciVendorSelector: "10de:1e04"
    resourceName: "nvidia.com/TU102_GeForce_RTX2080Ti"
  mediatedDevices:
  - mdevNameSelector: "GRID RTX6000-4Q"
    resourceName: "nvidia.com/GRID_RTX6000-4Q"

mediatedDevicesTypes:
  - nvidia-259

monitorNamespace: ""
monitorAccount: ""

useEmulation: false

featureGates:
  - AlignCPUs
  - ExpandDisks
  - CPUManager
  - DownwardMetrics
  - GPU
  - HostDevices
  - VMExport
  - DeclarativeHotplugVolumes
  - HostDisk
  - Macvtap
  - HotplugVolumes
  - Passt
  - HotplugNICs
  - clientPassthrough
  - Snapshot
  - CPUNodeDiscovery
  - VideoConfig
  - IncrementalBackup
  - EnableVirtioFsStorageVolumes
  - EnableVirtioFsConfigVolumes
  - PasstBinding
  - ObjectGraph
  - IncrementalBackup
  - VmiMemoryOverheadReport
  #- ImageVolume
  #- WorkloadEncryptionSEV
  #- WorkloadEncryptionTDX
  #- VSOCK
  #- Root
  #- KubevirtSeccompProfile
  #- PersistentReservation
  #- ExperimentalIgnitionSupport
  #- HypervStrictCheck
  #- Sidecar
  #- UtilityVolumes
  #- NodeRestriction
  #- LibvirtHooksServerAndClient
  #- GPUsWithDRA
  #- HostDevicesWithDRA
  #- PCINUMAAwareTopology
  #- DecentralizedLiveMigration
  #- SecureExecution
  #- MigrationPriorityQueue
  #- ConfigurableHypervisor
  #- ExternalNetResourceInjection
  #- RebootPolicy
  #- Template
  #- ContainerPathVolumes
  #- ReservedOverheadMemlock
  #- OptOutRoleAggregation
  #- LiveUpdateNADRef
  #- VGPULiveMigration
