# @schema
# type: object
# @schema
# -- Set options for a kubevirt virtual machine
virtualMachine:

  # @schema
  # type: string
  # default: my-vm
  # @schema
  # -- name of the virtualMachine or virtualMachinePool object
  name: my-vm

  # @schema
  # type: string
  # default: default
  # @schema
  # -- namespace to deploy to
  namespace: default

  # @schema
  # type: object
  # @schema
  # -- Cluster API Machine Template Configuration
  capiMachineTemplate:
    # @schema
    # type: boolean
    # default: false
    # @schema
    # -- Create the VM as a KubevirtMachineTemplate for use with Cluster API
    # disables all other templates and only create the VM and DataVolume
    # DataVolume
    enabled: false
    # @schema
    # type: string
    # enum: [ssh, none]
    # default: ssh
    # @schema
    # -- capi bootstrap testing method
    bootstrapCheck: ssh
    # @schema
    # type: string
    # enum: [worker, control-plane]
    # default: worker
    # @schema
    # -- role to assign the vm
    role: worker

  # @schema
  # type: string
  # enum: [Always, RerunOnFailure, Manual, Halted, Once]
  # default: Always
  # @schema
  # -- See: https://kubevirt.io/user-guide/compute/run_strategies/#runstrategy
  runStrategy: "Always"

  # @schema
  # type: object
  # @schema
  # -- Virtual Machine features
  features:
    kvm:
      # @schema
      # type: boolean
      # default: true
      # @schema
      # -- Enable KVM acceleration.
      enabled: true
      # @schema
      # type: boolean
      # default: false
      # @schema
      # -- When set to `true` will obscure kvm from the host.
      hidden: false

    # @schema
    # type: boolean
    # default: false
    # @schema
    # -- Set default hyperv settings for windows guests
    hyperv: false

    # @schema
    # type: boolean
    # default: true
    # @schema
    # -- Enable ACPI platform event device
    acpiEnabled: true

    # @schema
    # type: boolean
    # default: true
    # @schema
    # -- Make pod network interface the default for the VM
    autoattachPodInterface: true

    # @schema
    # type: boolean
    # default: true
    # @schema
    # -- Attach a serial console device
    autoattachSerialConsole: true

    # @schema
    # type: boolean
    # default: true
    # @schema
    # -- Attach a basic graphics device for VNC access
    autoattachGraphicsDevice: true

    # @schema
    # type: string
    # enum: [virtio, vga, bochs, cirrus, ramfb]
    # default: virtio
    # @schema
    # -- Specify a video device type. Requires `VideoConfig` feature gate
    graphicsDeviceType: virtio

    # @schema
    # type: boolean
    # default: true
    # @schema
    # -- Enhances network performance by allowing multiple TX and RX queues.
    networkInterfaceMultiqueue: true

  # @schema
  # type: object
  # @schema
  # -- Clock and Timer Settings
  clock:
    # @schema
    # type: boolean
    # default: true
    # @schema
    # -- Enable machine clock
    enabled: true

    # @schema
    # type: string
    # default: utc
    # @schema
    # -- Set clock timezone eg: "Europe/Amsterdam" or "utc"
    timezone: utc

    hpet:
      # @schema
      # type: boolean
      # default: true
      # @schema
      # -- Enable High Precision Event Timer Options
      enabled: true
      # @schema
      # type: boolean
      # default: false
      # @schema
      # -- Specify if HPET is present or not
      present: false

    pit:
      # @schema
      # type: boolean
      # default: true
      # @schema
      # -- Enable Programmable interval timer
      enabled: true
      # @schema
      # type: string
      # enum: [discard, delay, slew]
      # default: delay
      # @schema
      # -- Set PIT lost_tick_policy
      tickPolicy: delay

    rtc:
      # @schema
      # type: boolean
      # default: true
      # @schema
      # -- Enable Real-Time Clock
      enabled: true
      # @schema
      # type: string
      # enum: [catchup, delay, discard]
      # default: catchup
      # @schema
      # -- Real-Time Clock tick policy
      tickPolicy: catchup

    # @schema
    # type: boolean
    # default: true
    # @schema
    # -- Paravirtualized clock that provides better accuracy and performance.
    # Recommended clock source for KVM guest virtual machines.
    kvm: true

    # @schema
    # type: boolean
    # default: false
    # @schema
    # -- Hyper-V's reference time counter for use with Windows guests.
    hyperv: false

  # @schema
  # type: object
  # @schema
  # -- Firmware and Bios Options
  firmware:
    # @schema
    # type: boolean
    # default: false
    # @schema
    # -- Enable System Management Mode (required for secureboot)
    smmEnabled: false

    # @schema
    # type: object
    # @schema
    # -- EFI Bios Options
    efi:
      # @schema
      # type: boolean
      # default: true
      # @schema
      # -- Enable EFI bios
      enabled: true

      # @schema
      # type: boolean
      # default: false
      # @schema
      # -- Enable secureboot (Requiers EFI)
      secureBoot: false

    # @schema
    # type: string
    # default: c3c6c3f4-7e3b-4538-8e5a-b31975deb07d
    # @schema
    # -- SMBIOS UUID
    uuid: c3c6c3f4-7e3b-4538-8e5a-b31975deb07d

    # @schema
    # type: string
    # default: a16a7d3d-65bc-4528-8470-8f0698be869a
    # @schema
    # -- SMBIOS serial number
    serial: a16a7d3d-65bc-4528-8470-8f0698be869a

  # @schema
  # type: object
  # @schema
  # -- Virtual Hardware Options
  machine:
    # @schema
    # anyOf:
    # - type: string
    # - type: null
    # default: null
    # @schema
    # -- If a Pod cannot be scheduled, lower priorityClass Pods will be evicted
    priorityClassName: null

    # -- Define CPU, RAM, GPU, HostDevice settings for VMs.
    # Overrides: vCores, memory, gpus
    instancetype:
      # @schema
      # type: boolean
      # default: false
      # @schema
      # -- Enable usage of InstanceTypes
      enabled: false
      # @schema
      # default: u1.nano
      # @schema
      # -- Name of the instance type
      name: u1.nano
      # @schema
      # type: string
      # default: virtualMachineClusterInstancetype
      # @schema
      # -- CRD name of the instance type
      kind: virtualMachineClusterInstancetype

    # @schema
    # type: string
    # enum: [amd64, arm64]
    # default: amd64
    # @schema
    # -- System Architecture.
    architecture: amd64

    # @schema
    # type: string
    # enum: [q35, i440fx]
    # default: q35
    # @schema
    # -- QEMU virtual-machine type.
    machineType: q35

    # @schema
    # default: host-passthrough
    # @schema
    # -- Specify hots-passthrough or a named cpu model
    # https://www.qemu.org/docs/master/system/qemu-cpu-models.html
    cpuModel: host-passthrough

    # @schema
    # type: integer
    # default: 1
    # @schema
    # -- Number of simulated CPU sockets.
    # Note: Multiple cpu-bound microbenchmarks show a significant
    # performance advantage when using sockets instead of cores
    # Does not work with some cpuManagerPolicy options.
    # Ignored if overProvisionCPU is set to true
    sockets: 1

    # @schema
    # type: integer
    # default: 2
    # @schema
    # -- Max Number of Virtual cores to pass to the Guest
    # Garunteed when overProvisionCPU is false
    # Ignored when instancetype is defined
    vCores: 2

    # @schema
    # type: boolean
    # default: false
    # @schema
    # -- Set CPU requests of VM to below CPU limit - allows overprovisioning
    overProvisionCPU: false

    # @schema
    # type: string
    # default: 200m
    # @schema
    # -- Minimum Garunteed CPU (millicores) provided to an overprovisioned vm
    # Ignored when overProvisionCPU set to false
    reservedCores: 200m

    # @schema
    # type: integer
    # default: 1
    # @schema
    # -- Enable simulation of Hyperthreading on Intel CPUs or SMT AMD CPUs.
    # Ignored if overProvisionCPU is set to true
    threads: 1

    # @schema
    # type: boolean
    # default: false
    # @schema
    # -- Pin QEMU process threads to specific physical cores
    # Requires `--cpu-manager-policy` enabled in kubelet
    # When true pins emulation threads to physical cores.
    # May not be used when overProvisionCPU set to true
    pinCores: false

    # @schema
    # type: boolean
    # default: false
    # @schema
    # -- In order to enhance the real-time support in KubeVirt and provide
    # improved latency, KubeVirt will allocate an additional dedicated CPU,
    # exclusively for the emulator thread, to which it will be pinned.
    # Requires `pinCores` set to `true`
    #
    # Broken, see https://github.com/kubevirt/kubevirt/issues/17003
    emulatorThread: false

    ioThreads:
      # @schema
      # type: boolean
      # default: false
      # @schema
      # -- Libvirt has the ability to use IOThreads for dedicated disk access
      # (for supported devices).
      # These are dedicated event loop threads that perform block I/O requests
      # and improve scalability on SMP systems.
      #
      # broken: see https://github.com/kubevirt/kubevirt/issues/17003
      enabled: false
      # @schema
      # type: string
      # enum: [shared, auto, supplementalPool]
      # default: auto
      # @schema
      # -- See: https://kubevirt.io/user-guide/storage/disks_and_volumes/#iothreads
      policy: auto
      # @schema
      # type: integer
      # default: 1
      # @schema
      # -- number of total core to allocate to IO when using `supplementalPool`
      count: 1

    memory:
      # @schema
      # type: string
      # default: 2Gi
      # @schema
      # -- Amount of RAM to pass to the Guest.
      # Ignored when instancetype is defined
      base: 2Gi
      overcommit:
        # @schema
        # type: boolean
        # default: false
        # @schema
        # -- Enable memory overcommitment.
        # Tells VM it has more RAM than requested.
        # VMI becomes Burtable QOS class and may be preempted when node
        # is under memory pressure.
        # GPU passthrough and vGPU will not function with overcommit enabled.
        enabled: false
        # @schema
        # type: string
        # default: 4Gi
        # @schema
        # -- Amount of memory to tell the VM it has access to.
        limit: 4Gi
        # @schema
        # type: boolean
        # default: false
        # @schema
        # -- Do not allocate hypervisor overhead memory to VM.
        # Will work for as long as most of the VirtualMachineInstances
        # do not request the full memory.
        overhead: false


  # @schema
  # type: array
  # items:
  #   type: object
  #   properties:
  #     name:
  #       type: string
  #     deviceName:
  #       type: string
  # @schema
  #     virtualGPUOptions:
  #       type: object:
  #       properties:
  #         display:
  #           type: object
  #           properties:
  #             enabled:
  #               type: boolean
  #             ramFB:
  #               type: object
  #               properties:
  #                 enabled:
  #                   type: boolean
  # -- GPU to pass to guest, requires that the GPUs are pre-configured in the
  # kubevirt custom resource. ignored when instancetype is defined.
  # ramFB & display may only be enabled on 1 vGPU
  gpus: []
  # - name: gpu0
  #   deviceName: nvidia.com/GRID_RTX6000-4Q
  #   virtualGPUOptions:
  #     display:
  #       enabled: true
  #       ramFB:
  #         enabled: true

  # @schema
  # type: array
  # default: [{name: default, pod: {}}]
  # @schema
  # -- Connecting a virtual machine to a network consists of two parts.
  # First, networks are specified in spec.networks.
  # Then, interfaces backed by the networks are added to the VM by specifying
  # them in `spec.domain.devices.interfaces`.
  # See: https://kubevirt.io/user-guide/network/interfaces_and_networks/#networks
  networks:
    - name: default
      pod: {}

  # @schema
  # type: array
  # default: [{name: default, bridge: {}}]
  # @schema
  # -- virtual interfaces to connect to the network.
  # See: https://kubevirt.io/user-guide/network/interfaces_and_networks/#interfaces
  interfaces:
    - name: default
      bridge: {}


# @schema
# type: object
# @schema
# -- Deploy multiple VMs as a pool
virtualMachinePool:
  # @schema
  # type: boolean
  # default: false
  # @schema
  # -- Create a Virtual Machine Pool
  # Vm pools should be used with ephemeral disks or containerdisks
  # otherwise they would all fight over the same PVC.
  enabled: false
  # @schema
  # type: integer
  # default: 2
  # @schema
  # -- Number of replicas to create.
  # be sure to set RespectIgnoreDifferences in argocd when using autoscaling
  # https://argo-cd.readthedocs.io/en/stable/user-guide/sync-options/#respect-ignore-differences-configs
  replicas: 2
  # TODO
  maxUnavailable: 1
  updateStrategy:
    proactive:
      selectionPolicy:
        basePolicy: "Oldest"
  scaleInStrategy:
    proactive:
      statePreservation: "Offline"
      selectionPolicy:
        basePolicy: "Oldest"

  # @schema
  # type: object
  # @schema
  # -- Configure Horizontal Pod Autoscaler
  hpa:
    # @schema
    # type: boolean
    # default: false
    # @schema
    # -- Enable scaling the pool via the K8s HPA
    enabled: false
    # @schema
    # type: integer
    # default: 5
    # @schema
    # -- Max number of replicas to allow
    maxReplicas: 5
    # @schema
    # type: integer
    # default: 1
    # @schema
    # -- Minimum number of replicas to allow
    minReplicas: 1

