  #   nodePlacement: scremlin
  #   pvaccessMode: ReadWriteOnce
  #   source: pvc
  #   pvcnamespace: kubevirt
  #   pvcname: debian12

  ##########################################################
  # ISO live-image example
  ##########################################################
  # - name: iso
  #   type: cdrom
  #   bus: sata
  #   bootorder: 1
