  #   type: disk
  #   bus: virtio
  #   bootorder: 2
  #   readonly: false
  #   pvsize: 32G
  #   pvstorageClassName: local-path
  #   nodePlacement: node0
  #   pvaccessMode: ReadWriteOnce

  ##########################################################
  # Container Disk Example
  # see: https://github.com/kubevirt/containerdisks
